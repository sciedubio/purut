                                const dateObj = new Date(year, month, day);
                                dateObj.setHours(0,0,0,0);
                                const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                const isToday = dateObj.getTime() === today.getTime();
                                const isSelected = dateStr === selectedCalDate;
                                
                                const tasksForDay = [];
                                plants.forEach(p => {
                                    Object.entries(p.tasks).forEach(([type, dStr]) => {
                                        if (dStr === dateStr) tasksForDay.push(type);
                                    });
                                });
                                const doneForDay = actionHistory.filter(h => h.date.startsWith(dateStr)).map(h => h.content);

                                const dots = [...new Set(tasksForDay.map(t => TASK_META[t]?.dot))].slice(0, 3);
                                if (doneForDay.length > 0) dots.push('bg-emerald-500'); 

                                return (
                                    <div 
                                        key={day} 
                                        onClick={() => setSelectedCalDate(dateStr)}
                                        className={`p-2 flex flex-col items-center justify-start h-12 rounded-xl transition-all cursor-pointer hover:bg-emerald-50 
                                            ${isSelected ? 'ring-2 ring-emerald-400 bg-emerald-50' : ''} 
                                            ${isToday && !isSelected ? 'bg-emerald-100 text-emerald-700 font-bold' : 'text-gray-700'}
                                        `}
                                    >
                                        <span>{day}</span>
                                        <div className="flex space-x-0.5 mt-1">
                                            {[...new Set(dots)].map((dotCls, i) => (
                                                <div key={i} className={`w-1.5 h-1.5 rounded-full ${dotCls}`}></div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="mt-4 pt-4 border-t border-gray-100 flex flex-wrap gap-2 text-xs text-gray-500 justify-center mb-6">
                            <div className="flex items-center"><div className="w-2 h-2 rounded-full bg-blue-600 mr-1"></div>물주기</div>
                            <div className="flex items-center"><div className="w-2 h-2 rounded-full bg-blue-400 mr-1"></div>환기</div>
                            <div className="flex items-center"><div className="w-2 h-2 rounded-full bg-green-500 mr-1"></div>영양</div>
                            <div className="flex items-center"><div className="w-2 h-2 rounded-full bg-emerald-500 mr-1"></div>완료됨</div>
                        </div>

                        <div className="p-4 bg-gray-50 rounded-xl border border-gray-100 relative fade-in">
                            <div className="absolute -top-3 left-4 bg-white px-2 text-xs font-bold text-emerald-600 border border-gray-100 rounded-md shadow-sm">
                                {selectedCalDate}
                            </div>
                            {selectedTasks.length === 0 && selectedDone.length === 0 ? (
                                <p className="text-xs text-gray-400 text-center py-4">일정이 없습니다.</p>
                            ) : (
                                <div className="space-y-2 mt-2">
                                    {selectedTasks.map((t, i) => (
                                        <div key={i} className="flex items-center justify-between text-sm">
                                            <span className="font-bold text-gray-700">{t.plant.name}</span>
                                            <span className={`text-xs px-2 py-0.5 rounded-md font-medium ${TASK_META[t.type].color} bg-white border border-gray-200 shadow-sm`}>
                                                {TASK_META[t.type].title} 예정
                                            </span>
                                        </div>
                                    ))}
                                    {selectedDone.map((d, i) => (
                                        <div key={`done-${i}`} className="flex items-center justify-between text-sm opacity-60">
                                            <span className="font-bold text-gray-500 line-through decoration-gray-400">{d.content}</span>
                                            <span className="text-[10px] bg-emerald-100 text-emerald-600 font-bold px-1.5 py-0.5 rounded">완료됨</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // ✨ 3. 로그인 화면 처리 (로그인 안 되어 있으면 이 화면만 보여줌)
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-emerald-50 flex flex-col items-center justify-center p-6 fade-in">
                        <div className="bg-white p-8 rounded-3xl shadow-lg w-full max-w-sm flex flex-col items-center text-center border border-emerald-100">
                            <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-4xl mb-4 shadow-inner">
                                🌱
                            </div>
                            <h2 className="text-2xl font-extrabold text-emerald-600 mb-1 tracking-tight">Purut</h2>
                            <p className="text-sm text-gray-500 mb-8">나만의 반려식물 공간입니다.<br/>비밀번호를 입력해주세요.</p>
                            
                            <div className="w-full">
                                <input 
                                    type="password" 
                                    value={inputPw}
                                    onChange={(e) => { setInputPw(e.target.value); setPwError(false); }}
                                    onKeyPress={(e) => {
                                        if (e.key === 'Enter') {
                                            if (inputPw === SECRET_PASSWORD) {
                                                localStorage.setItem('groo_logged_in', 'true');
                                                setIsLoggedIn(true);
                                            } else {
                                                setPwError(true);
                                                setInputPw('');
                                            }
                                        }
                                    }}
                                    placeholder="비밀번호 4자리" 
                                    className={`w-full bg-gray-50 border ${pwError ? 'border-red-400' : 'border-gray-200'} rounded-2xl px-4 py-4 text-center text-xl tracking-[0.5em] font-bold outline-none focus:border-emerald-500 focus:bg-white transition-colors mb-2`}
                                />
                                {pwError && <p className="text-xs text-red-500 font-bold mb-4 animate-bounce">비밀번호가 일치하지 않습니다.</p>}
                                
                                <button 
                                    onClick={() => {
                                        if (inputPw === SECRET_PASSWORD) {
                                            localStorage.setItem('groo_logged_in', 'true');
                                            setIsLoggedIn(true);
                                        } else {
                                            setPwError(true);
                                            setInputPw('');
                                        }
                                    }}
                                    className="w-full mt-4 py-4 rounded-2xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors shadow-md"
                                >
                                    입장하기
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (showIntro) return <Intro onFinish={() => setShowIntro(false)} />;

            return (
                <div className="min-h-screen pb-24 flex flex-col">
                    {/* Top Header */}
                    <header className="px-5 pt-10 pb-4 bg-white sticky top-0 z-30 flex justify-between items-center shadow-sm">
                        <div className="text-3xl font-extrabold text-emerald-500 tracking-tighter flex items-center">
                            Purut
                            {isSyncing && <span className="ml-3 mt-1 flex h-3 w-3 relative">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                            </span>}
                        </div>
                        <div className="flex items-center space-x-3 text-gray-600 relative">
                            
                            {/* ✨ 가이드 버튼 */}
                            <button onClick={() => setIsGuideOpen(true)} className="hover:text-emerald-500 transition-colors relative group" title="DB 연동 가이드">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            </button>

                            {/* 알림 버튼 */}
                            <button 
                                className="relative hover:text-emerald-500 transition-colors"
                                onClick={() => {
                                    setIsNotiOpen(!isNotiOpen);
                                    if (!isNotiOpen) setNotifications(prev => prev.map(n => ({...n, isRead: true})));
                                }}
                            >
                                <Icons.Bell />
                                {notifications.some(n => !n.isRead) && (
                                    <span className="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                                )}
                            </button>

                            {/* ✨ 마이페이지 버튼 */}
                            <button onClick={() => setView('mypage')} className={`hover:text-emerald-500 transition-colors ${view === 'mypage' ? 'text-emerald-500' : ''}`}>
                                <Icons.User />
                            </button>

                            {/* 알림 드롭다운 창 */}
                            {isNotiOpen && (
                                <div className="absolute top-8 right-0 mt-2 w-64 bg-white rounded-2xl shadow-xl border border-gray-100 z-50 overflow-hidden fade-in">
                                    <div className="p-3 bg-gray-50 border-b border-gray-100 font-bold text-sm text-gray-800 flex justify-between items-center">
                                        <span>알림</span>
                                        <button onClick={() => setIsNotiOpen(false)} className="text-gray-400 hover:text-gray-600">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                    <div className="max-h-64 overflow-y-auto">
                                        {notifications.length > 0 ? notifications.map(noti => (
                                            <div key={noti.id} className="p-3 border-b border-gray-50 hover:bg-gray-50 transition-colors cursor-pointer text-left flex items-start">
                                                <div className="mr-2 mt-0.5">{noti.text.charAt(0)}</div>
                                                <div>
                                                    <p className="text-xs text-gray-800 mb-1 font-medium">{noti.text.substring(2)}</p>
                                                    <p className="text-[10px] text-gray-400">{noti.time}</p>
                                                </div>
                                            </div>
                                        )) : (
                                            <div className="p-6 text-center text-xs text-gray-400">새로운 알림이 없습니다.</div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 px-4">
                        {view === 'today' && (
                            <div className="slide-up">
                                <div className="grid grid-cols-3 gap-3 my-4">
                                    <button onClick={() => { setView('guide'); setGuideMode('diagnose'); }} className="bg-white rounded-xl py-3 flex flex-col items-center justify-center shadow-sm border border-purple-100 hover:bg-purple-50 transition-colors">
                                        <div className="w-8 h-8 rounded-full mb-1 flex items-center justify-center bg-purple-100 text-purple-600 text-lg">✨</div>
                                        <span className="text-xs font-bold text-gray-700">AI 식물 진단</span>
                                    </button>
                                    <button onClick={() => { setView('guide'); setGuideMode('search'); }} className="bg-white rounded-xl py-3 flex flex-col items-center justify-center shadow-sm border border-indigo-100 hover:bg-indigo-50 transition-colors">
                                        <div className="w-8 h-8 rounded-full mb-1 flex items-center justify-center bg-indigo-100 text-indigo-600 text-lg">📚</div>
                                        <span className="text-xs font-bold text-gray-700">백과사전</span>
                                    </button>
                                    <button onClick={handleTodayTip} disabled={isAILoadingTip} className="bg-white rounded-xl py-3 flex flex-col items-center justify-center shadow-sm border border-amber-100 hover:bg-amber-50 transition-colors relative">
                                        <div className="w-8 h-8 rounded-full mb-1 flex items-center justify-center bg-amber-100 text-amber-500 text-lg">
                                            {isAILoadingTip ? <span className="w-4 h-4 border-2 border-amber-500 rounded-full loader"></span> : '💡'}
                                        </div>
                                        <span className="text-xs font-bold text-gray-700">오늘의 꿀팁</span>
                                    </button>
                                </div>

                                <div className="flex bg-gray-100 rounded-full p-1 mb-6">
                                    <button className={`flex-1 py-2 rounded-full text-sm font-bold transition-all ${todayTab === 'today' ? 'bg-white shadow text-gray-900' : 'text-gray-500'}`} onClick={() => setTodayTab('today')}>오늘</button>
                                    <button className={`flex-1 py-2 rounded-full text-sm font-bold transition-all ${todayTab === 'planned' ? 'bg-white shadow text-gray-900' : 'text-gray-500'}`} onClick={() => setTodayTab('planned')}>예정</button>
                                    <button className={`flex-1 py-2 rounded-full text-sm font-bold transition-all flex justify-center items-center ${todayTab === 'calendar' ? 'bg-white shadow text-emerald-600' : 'text-gray-500'}`} onClick={() => setTodayTab('calendar')}><Icons.Calendar/><span className="ml-1">달력</span></button>
                                </div>

                                {todayTab === 'today' && (
                                    <div className="space-y-6">
                                        {weather && (
                                            <div className="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl p-4 flex items-center justify-between border border-blue-100 shadow-sm">
                                                <div>
                                                    <div className="text-xs text-blue-500 font-bold mb-1">오늘의 날씨 기반 추천</div>
                                                    <div className="text-sm text-gray-700 font-medium">{weather.icon} {weather.desc}, {weather.temp}°C</div>
                                                    <div className="text-xs text-gray-500 mt-1">{weather.temp > 25 ? '더운 날이에요! 식물들이 목말라할 수 있어요💧' : '식물들이 광합성하기 참 좋은 날이에요☀️'}</div>
                                                </div>
                                            </div>
                                        )}

                                        {['water', 'ventilate', 'spray', 'nutrient', 'repot'].map(taskType => {
                                            const tasks = parsedTasks.todayList[taskType];
                                            if (!tasks || tasks.length === 0) return null;
                                            const meta = TASK_META[taskType];
                                            const IconObj = meta.icon;

                                            return (
                                                <div key={taskType} className="bg-white rounded-3xl p-5 shadow-sm border border-gray-50">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <div className="flex items-center space-x-2">
                                                            <IconObj cls={meta.color} />
                                                            <h2 className="text-lg font-bold text-gray-800">{meta.title}</h2>
                                                        </div>
                                                        <button 
                                                            className="text-emerald-500 text-sm font-bold flex items-center hover:text-emerald-600 transition-colors" 
                                                            onClick={() => setConfirmData({
                                                                isOpen: true,
                                                                message: `${meta.title} 항목 ${tasks.length}개를 모두 완료 처리하시겠습니까?`,
                                                                onConfirm: () => handleCompleteAllTasks(taskType, tasks)
                                                            })}
                                                        >
                                                            <span className="underline underline-offset-4 decoration-emerald-300">{tasks.length}개 모두 적용</span>
                                                            <svg className="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 15l7-7 7 7"/></svg>
                                                        </button>
                                                    </div>

                                                    <div className="space-y-4">
                                                        {tasks.map(({ plant, diff }) => {
                                                            const isDoing = loadingTask === `${plant.id}-${taskType}`;
                                                            return (
                                                                <div key={plant.id} className={`flex items-center justify-between py-2 transition-opacity ${isDoing ? 'opacity-50' : ''}`}>
                                                                    <div className="flex items-center space-x-4 flex-1 cursor-pointer" onClick={() => { setEditingPlant({...plant}); setDetailTab('info'); }}>
                                                                        <div className="relative">
                                                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-2xl overflow-hidden bg-cover bg-center ${plant.color}`} style={plant.imageBase64 && !plant.imageBase64.includes('업로드실패') ? { backgroundImage: `url(${plant.imageBase64})` } : {}}>
                                                                                {(!plant.imageBase64 || plant.imageBase64.includes('업로드실패')) && (plant.photo || '🌿')}
                                                                            </div>
                                                                            {plant.createdAt && <div className="absolute -top-2 -right-2 bg-emerald-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">{calculateDday(plant.createdAt)}</div>}
                                                                        </div>
                                                                        <div>
                                                                            <div className="font-bold text-gray-800 text-base">{plant.name}</div>
                                                                            <div className="flex items-center space-x-2 mt-1">
                                                                                <button 
                                                                                    onClick={(e) => { e.stopPropagation(); handleTaskAction(plant.id, taskType, 'delay'); }}
                                                                                    className="text-xs text-emerald-600 border border-emerald-500 px-2 py-0.5 rounded font-medium hover:bg-emerald-50 transition-colors"
                                                                                    disabled={isDoing}
                                                                                >미루기</button>
                                                                                <span className="text-sm text-gray-500">{diff === 0 ? '오늘' : `${Math.abs(diff)}일 지남`}</span>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                    <button onClick={(e) => { e.stopPropagation(); handleTaskAction(plant.id, taskType, 'complete'); }} disabled={isDoing} className="p-2 ml-2">
                                                                        {isDoing ? <div className="w-6 h-6 border-2 rounded-full loader text-emerald-500"></div> : <Icons.CheckCircle checked={false} />}
                                                                    </button>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {Object.values(parsedTasks.todayList).every(arr => arr.length === 0) && (
                                            <div className="text-center py-10 text-gray-400">오늘 할 일이 모두 끝났어요! 🌱</div>
                                        )}
                                    </div>
                                )}

                                {todayTab === 'planned' && (
                                    <div className="space-y-8 mt-2">
                                        {parsedTasks.sortedPlannedKeys.map(diffDays => (
                                            <div key={diffDays}>
                                                <h3 className="font-bold text-lg text-gray-800 mb-3 ml-1">{diffDays}일 뒤</h3>
                                                <div className="space-y-3">
                                                    {parsedTasks.plannedList[diffDays].map(({ plant, taskType }, idx) => {
                                                        const isDoing = loadingTask === `${plant.id}-${taskType}`;
                                                        return (
                                                        <div key={`${plant.id}-${idx}`} onClick={() => { setEditingPlant({...plant}); setDetailTab('info'); }} className={`bg-white rounded-2xl p-4 flex items-center justify-between shadow-sm border border-gray-50 cursor-pointer hover:shadow-md transition-all ${isDoing ? 'opacity-50' : ''}`}>
                                                            <div className="flex items-center space-x-4">
                                                                <div className="relative">
                                                                    <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl overflow-hidden bg-cover bg-center ${plant.color}`} style={plant.imageBase64 && !plant.imageBase64.includes('업로드실패') ? { backgroundImage: `url(${plant.imageBase64})` } : {}}>
                                                                        {(!plant.imageBase64 || plant.imageBase64.includes('업로드실패')) && (plant.photo || <svg className="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>)}
                                                                    </div>
                                                                    {plant.createdAt && <div className="absolute -top-2 -right-2 bg-emerald-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">{calculateDday(plant.createdAt)}</div>}
                                                                </div>
                                                                <div>
                                                                    <div className="font-bold text-gray-800">{plant.name}</div>
                                                                    <div className="text-sm text-gray-500 mt-0.5">{TASK_META[taskType].title}</div>
                                                                </div>
                                                            </div>
                                                            <button 
                                                                onClick={(e) => { e.stopPropagation(); handleTaskAction(plant.id, taskType, 'complete'); }}
                                                                disabled={isDoing}
                                                                className="text-xs bg-gray-50 hover:bg-emerald-50 hover:text-emerald-600 text-gray-500 font-bold px-3 py-2 rounded-xl transition-colors border border-gray-200 hover:border-emerald-200 shadow-sm"
                                                            >
                                                                {isDoing ? '처리중...' : '미리 하기'}
                                                            </button>
                                                        </div>
                                                    )})}
                                                </div>
                                            </div>
                                        ))}
                                        {parsedTasks.sortedPlannedKeys.length === 0 && (
                                            <div className="text-center py-10 text-gray-400">예정된 일이 없습니다.</div>
                                        )}
                                    </div>
                                )}

                                {todayTab === 'calendar' && renderCalendar()}
                            </div>
                        )}

                        {view === 'plants' && (
                            <div className="slide-up py-4">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-gray-800">나의 반려식물 ({plants.length})</h2>
                                    <button onClick={() => setIsAddModalOpen(true)} className="bg-emerald-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-emerald-600 transition-colors">
                                        + 새 식물 등록
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {plants.map(plant => (
                                        <div key={plant.id} onClick={() => { setEditingPlant({...plant}); setDetailTab('info'); }} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-50 flex flex-col items-center text-center cursor-pointer hover:shadow-md transition-shadow relative">
                                            <div className="absolute top-3 right-3 text-gray-300">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                            </div>
                                            <div className="relative mb-3">
                                                <div className={`w-16 h-16 rounded-full flex items-center justify-center text-3xl overflow-hidden bg-cover bg-center ${plant.color}`} style={plant.imageBase64 && !plant.imageBase64.includes('업로드실패') ? { backgroundImage: `url(${plant.imageBase64})` } : {}}>
                                                    {(!plant.imageBase64 || plant.imageBase64.includes('업로드실패')) && (plant.photo || '🌿')}
                                                </div>
                                                {plant.createdAt && <div className="absolute -top-1 -right-1 bg-emerald-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm border border-white z-10">{calculateDday(plant.createdAt)}</div>}
                                            </div>
                                            <h3 className="font-bold text-gray-800 mb-1">{plant.name}</h3>
                                            <p className="text-xs text-emerald-500 font-medium mb-1">{plant.location || '위치 미지정'}</p>
                                            <p className="text-xs text-gray-400">
                                                {plant.tasks.water ? (() => {
                                                    const diff = calculateDiffDays(plant.tasks.water);
                                                    return diff <= 0 ? '오늘 물주기!' : `물주기 ${diff}일 전`;
                                                })() : '주기 설정됨'}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'note' && (
                            <div className="slide-up py-4">
                                <h2 className="text-xl font-bold text-gray-800 mb-6">식물 노트 📝</h2>
                                
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-50 mb-6">
                                    <select value={selectedPlantForNote} onChange={(e) => setSelectedPlantForNote(e.target.value)} className="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm outline-none focus:border-emerald-500 mb-3">

                                                        <span>{meta.title}</span>
                                                    </div>
                                                    <div className="flex items-center space-x-1">
                                                        <input type="number" value={newPlantForm.cycles[key]} onChange={e => setNewPlantForm({...newPlantForm, cycles: {...newPlantForm.cycles, [key]: e.target.value}})} className="w-16 bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-center text-sm outline-none focus:border-emerald-500" min="1" />
                                                        <span className="text-xs text-gray-400">일</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <button onClick={handleAddPlant} className="w-full mt-6 py-3.5 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors shadow-md flex justify-center items-center">
                                    등록 완료
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ✨ 식물 상세 / 성장 앨범 모달 */}
                    {editingPlant && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-40 fade-in p-4">
                            <div className="bg-white rounded-3xl w-full max-w-sm shadow-2xl slide-up flex flex-col max-h-[90vh] overflow-hidden">
                                <div className="flex justify-between items-center p-5 border-b border-gray-50">
                                    <h3 className="font-bold text-lg text-gray-800">식물 정보</h3>
                                    <button onClick={() => setEditingPlant(null)} className="text-gray-400 hover:bg-gray-100 rounded-full p-1 transition-colors"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                                </div>
                                
                                {/* 탭 스위치 */}
                                <div className="flex bg-gray-100 p-1 mx-5 mt-4 rounded-xl mb-2">
                                    <button onClick={() => setDetailTab('info')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${detailTab === 'info' ? 'bg-white shadow text-emerald-600' : 'text-gray-500'}`}>상세 정보</button>
                                    <button onClick={() => setDetailTab('album')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${detailTab === 'album' ? 'bg-white shadow text-emerald-600' : 'text-gray-500'}`}>🌱 성장 앨범</button>
                                    <button onClick={() => setDetailTab('guide')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all flex justify-center items-center ${detailTab === 'guide' ? 'bg-white shadow text-emerald-600' : 'text-gray-500'}`}><span className="mr-1">📖</span> 가이드</button>
                                </div>

                                <div className="p-5 overflow-y-auto flex-1 space-y-4">
                                    {detailTab === 'info' && (
                                        <div className="fade-in space-y-4">
                                            <div className="flex flex-col items-center mb-2">
                                                <label className="cursor-pointer group relative">
                                                    <div className={`w-24 h-24 rounded-full flex items-center justify-center text-4xl bg-green-100 overflow-hidden bg-cover bg-center shadow-inner border-2 border-dashed border-gray-200 group-hover:border-emerald-500 transition-colors`} style={editingPlant.imageBase64 && !editingPlant.imageBase64.includes('업로드실패') ? { backgroundImage: `url(${editingPlant.imageBase64})` } : {}}>
                                                        {(!editingPlant.imageBase64 || editingPlant.imageBase64.includes('업로드실패')) && (editingPlant.photo || '📷')}
                                                    </div>
                                                    <div className="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-30 rounded-full flex items-center justify-center transition-all">
                                                        <span className="text-white text-xs font-bold opacity-0 group-hover:opacity-100">프로필 변경</span>
                                                    </div>
                                                    <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, setEditingPlant)} />
                                                </label>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1.5 ml-1">식물 이름</label>
                                                <input type="text" value={editingPlant.name} onChange={e => setEditingPlant({...editingPlant, name: e.target.value})} className="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:bg-white transition-colors shadow-inner" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-sm font-bold text-gray-700 mb-1.5 ml-1">키우는 곳</label>
                                                    <input type="text" value={editingPlant.location || ''} onChange={e => setEditingPlant({...editingPlant, location: e.target.value})} className="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:bg-white transition-colors" placeholder="거실, 침실 등" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-bold text-gray-700 mb-1.5 ml-1">화분 종류</label>
                                                    <input type="text" value={editingPlant.potType || ''} onChange={e => setEditingPlant({...editingPlant, potType: e.target.value})} className="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:bg-white transition-colors" placeholder="토분, 슬릿분 등" />
                                                </div>
                                            </div>
                                            <div className="pt-2">
                                                <label className="block text-sm font-bold text-gray-700 mb-2 ml-1">관리 주기 설정 (일)</label>
                                                <div className="space-y-2 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                                    {Object.entries(TASK_META).map(([key, meta]) => {
                                                        const currentCycle = (editingPlant.cycles && editingPlant.cycles[key]) ? editingPlant.cycles[key] : meta.cycle;
                                                        return (
                                                            <div key={key} className="flex justify-between items-center">
                                                                <div className="flex items-center space-x-2 text-sm text-gray-600 font-medium">
                                                                    <meta.icon cls={`w-4 h-4 ${meta.color}`} />
                                                                    <span>{meta.title}</span>
                                                                </div>
                                                                <div className="flex items-center space-x-1">
                                                                    <input type="number" value={currentCycle} onChange={e => setEditingPlant({...editingPlant, cycles: {...(editingPlant.cycles||{}), [key]: e.target.value}})} className="w-16 bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-center text-sm outline-none focus:border-emerald-500" min="1" />
                                                                    <span className="text-xs text-gray-400">일</span>
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                            
                                            <div className="pt-4 border-t border-gray-100 mt-6">
                                                <h4 className="text-sm font-bold text-gray-800 mb-3 ml-1 flex items-center">
                                                    <svg className="w-4 h-4 mr-1 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                    식물 히스토리
                                                </h4>
                                                <div className="space-y-4 bg-gray-50 p-4 rounded-xl border border-gray-100 max-h-48 overflow-y-auto">
                                                    {(() => {
                                                        const pHistory = [
                                                            ...notes.filter(n => n.plantId === editingPlant.id).map(n => ({...n, isNote: true})),
                                                            ...actionHistory.filter(h => h.plantId === editingPlant.id)
                                                        ].sort((a, b) => new Date(b.date) - new Date(a.date));

                                                        if (pHistory.length === 0) return <div className="text-xs text-center text-gray-400 py-2">아직 관리 기록이 없어요.</div>;

                                                        return pHistory.map(item => (
                                                            <div key={item.id} className="flex space-x-3 text-sm">
                                                                <div className="flex flex-col items-center">
                                                                    <div className={`w-2 h-2 rounded-full mt-1.5 ${item.isNote ? 'bg-amber-400' : 'bg-emerald-400'}`}></div>
                                                                    <div className="w-0.5 h-full bg-gray-200 mt-1"></div>
                                                                </div>
                                                                <div className="pb-3 flex-1">
                                                                    <div className="text-xs text-gray-400 mb-0.5">{new Date(item.date).toLocaleDateString()}</div>
                                                                    <div className="text-gray-700 bg-white px-3 py-2 rounded-lg border border-gray-100 shadow-sm text-xs">
                                                                        {item.isNote ? <span className="font-medium text-amber-600 mr-1">[노트]</span> : null}
                                                                        {item.content}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ));
                                                    })()}
                                                </div>
                                            </div>
                                            
                                            <div className="mt-8 flex flex-col space-y-3 pb-2">
                                                <button onClick={handleSavePlant} disabled={isSavingPlant} className="w-full py-3.5 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors shadow-md flex justify-center items-center">
                                                    {isSavingPlant ? <><span className="w-5 h-5 border-2 border-white rounded-full loader mr-2"></span> 동기화 중...</> : '수정 완료'}
                                                </button>
                                                <button onClick={() => handleDeleteClick(editingPlant)} className="w-full py-3.5 rounded-xl font-bold text-red-500 bg-red-50 hover:bg-red-100 transition-colors">
                                                    이 식물 삭제하기
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {/* ✨ 성장 앨범 탭 */}
                                    {detailTab === 'album' && (
                                        <div className="fade-in min-h-[40vh] flex flex-col">
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="text-sm text-gray-500">총 <span className="font-bold text-emerald-600">{editingPlant.photos?.length || 0}</span>장의 사진</div>
                                                <label className="bg-emerald-50 text-emerald-600 hover:bg-emerald-100 px-3 py-1.5 rounded-lg text-xs font-bold cursor-pointer transition-colors shadow-sm border border-emerald-100 flex items-center">
                                                    {isSavingPlant ? <span className="w-3 h-3 border-2 border-emerald-600 rounded-full loader mr-1"></span> : '📷 '}
                                                    사진 추가
                                                    <input type="file" accept="image/*" className="hidden" onChange={handleAlbumUpload} disabled={isSavingPlant}/>
                                                </label>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3 pb-4">
                                                {editingPlant.photos && editingPlant.photos.length > 0 ? (
                                                    editingPlant.photos.map((pic, idx) => (
                                                        <div key={idx} className="relative rounded-xl overflow-hidden shadow-sm aspect-square bg-gray-100 group border border-gray-100">
                                                            <div className="w-full h-full bg-cover bg-center" style={{backgroundImage: `url(${pic.url && !pic.url.includes('업로드실패') ? pic.url : ''})`}}>
                                                                {pic.url && pic.url.includes('업로드실패') && <div className="absolute inset-0 flex items-center justify-center text-xs text-red-400 text-center p-2 bg-red-50">저장 실패<br/>(권한/ID)</div>}
                                                            </div>
                                                            <div className="absolute bottom-0 w-full bg-gradient-to-t from-black to-transparent p-2 pt-6">
                                                                <span className="text-white text-[10px] font-bold drop-shadow-md">{pic.date}</span>
                                                            </div>
                                                            {/* ✨ 앨범 사진 개별 삭제 버튼 추가 */}
                                                            <button 
                                                                onClick={(e) => { e.stopPropagation(); handleDeletePhoto(idx); }}
                                                                className="absolute top-2 right-2 w-6 h-6 bg-black bg-opacity-50 hover:bg-red-500 text-white rounded-full flex items-center justify-center transition-colors opacity-0 group-hover:opacity-100"
                                                            >
                                                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                                            </button>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="col-span-2 text-center py-16 text-gray-400 flex flex-col items-center">
                                                        <span className="text-4xl mb-2 opacity-50">🌱</span>
                                                        <span className="text-sm">아직 등록된 사진이 없어요.<br/>식물의 성장을 기록해 보세요!</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* ✨ 맞춤 관리 가이드 탭 */}
                                    {detailTab === 'guide' && (
                                        <div className="fade-in min-h-[40vh] flex flex-col">
                                            <div className="bg-emerald-50 rounded-xl p-4 mb-4 border border-emerald-100">
                                                <div className="flex items-center space-x-2 mb-2">
                                                    <span className="text-xl">🌿</span>
                                                    <h4 className="font-bold text-emerald-800 text-sm">{editingPlant.name} 맞춤 가이드</h4>
                                                </div>
                                                <p className="text-xs text-emerald-600 mb-3 leading-relaxed">AI가 이 식물에 딱 맞는 핵심 관리법을 정리해 드립니다. 한 번 생성하면 시트에 영구 저장됩니다!</p>
                                                
                                                {(!editingPlant.aiGuide) && (
                                                    <button 
                                                        onClick={handleGeneratePlantGuide} 
                                                        disabled={isSavingPlant}
                                                        className="w-full py-3 rounded-lg font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors shadow-sm flex justify-center items-center text-sm"
                                                    >
                                                        {isSavingPlant ? <><span className="w-4 h-4 border-2 border-white rounded-full loader mr-2"></span> 분석 및 저장 중...</> : '✨ AI 맞춤 가이드 생성하기'}
                                                    </button>
                                                )}
                                            </div>

                                            {editingPlant.aiGuide && (
                                                <div className="flex-1 bg-white border border-gray-100 rounded-xl p-5 shadow-sm text-sm text-gray-700 leading-relaxed whitespace-pre-wrap overflow-y-auto relative">
                                                    <button 
                                                        onClick={handleGeneratePlantGuide}
                                                        disabled={isSavingPlant}
                                                        className="absolute top-4 right-4 text-gray-400 hover:text-emerald-500 transition-colors bg-white rounded-full p-1 shadow-sm border border-gray-100"
                                                        title="가이드 다시 생성하기"
                                                    >
                                                        <svg className={`w-4 h-4 ${isSavingPlant ? 'animate-spin text-emerald-500' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                                                    </button>
                                                    {editingPlant.aiGuide.split('\n').map((line, i) => (
                                                        <p key={i} className="mb-2">
                                                            {line.split(/(\*\*.*?\*\*)/).map((part, j) => 
                                                                part.startsWith('**') && part.endsWith('**') ? <strong key={j} className="text-emerald-700 font-extrabold">{part.slice(2, -2)}</strong> : part
                                                            )}
                                                        </p>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
