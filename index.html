<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>식물 관리 앱 - Purut</title>

    <!-- ✨ PWA (바탕화면 앱 설치) 및 아이콘 설정 -->
    <meta name="theme-color" content="#10b981">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Purut">
    
    <!-- 귀여운 새싹(🌱) 아이콘 적용 (깨지지 않는 고화질 SVG) -->
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/npm/twemoji@11.3.0/2/svg/1f33f.svg">
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/npm/twemoji@11.3.0/2/svg/1f33f.svg">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; -webkit-tap-highlight-color: transparent; }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loader { border-top-color: currentColor; border-right-color: transparent; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================================
        // 🚨 중요 🚨: [배포 관리]에서 복사한 '최신 웹앱 주소'를 아래에 반드시 덮어쓰기 해주세요!
        // =========================================================================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWxumhOe6uphzhIC91l-yPAaXblKBjjnylGE4SUCIfSKGMDMK2bpLuJtiyeQExXp4k/exec"; 


        // ✨ Gemini AI 호출
        const callGeminiAPI = async (prompt, systemInstruction = "You are a helpful assistant.", imageBase64 = null) => {
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("여기에_")) {
                throw new Error("구글 스크립트 웹앱 주소가 입력되지 않았습니다. 코드를 확인해주세요.");
            }

            const payload = {
                recordType: 'ai_query',
                prompt: prompt,
                systemInstruction: systemInstruction,
                imageBase64: imageBase64
            };

            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (result.result === 'success') {
                return result.text;
            } else {
                throw new Error(result.error || "AI 호출 실패");
            }
        };

        const { useState, useEffect, useMemo } = React;

        // --- 아이콘 컴포넌트 (SVG) ---
        const Icons = {
            Bell: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
            User: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
            Crown: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
            Water: ({cls}) => <svg className={`w-5 h-5 ${cls}`} fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.5c-3.3 0-6-2.7-6-6 0-3 3.6-8.5 5.5-11.2.3-.4.8-.4 1.1 0 1.8 2.7 5.4 8.2 5.4 11.2 0 3.3-2.7 6-6 6z"/></svg>,
            Wind: ({cls}) => <svg className={`w-5 h-5 ${cls}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A4 4 0 002 9v2m15.248 2.832l-3.197 2.132A4 4 0 012 15v-2m18-6a4 4 0 00-5.656-5.656l-3.197 2.132a4 4 0 00-1.5 3.344"/></svg>,
            Spray: ({cls}) => <svg className={`w-5 h-5 ${cls}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>,
            Pill: ({cls}) => <svg className={`w-5 h-5 ${cls}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>,
            Shovel: ({cls}) => <svg className={`w-5 h-5 ${cls}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" /></svg>,
            NavToday: ({active}) => <svg className="w-6 h-6 mb-1" fill={active?"currentColor":"none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            NavLeaf: ({active}) => <svg className="w-6 h-6 mb-1" fill={active?"currentColor":"none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            NavNote: ({active}) => <svg className="w-6 h-6 mb-1" fill={active?"currentColor":"none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            NavChat: ({active}) => <svg className="w-6 h-6 mb-1" fill={active?"currentColor":"none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>,
            NavSearch: ({active}) => <svg className="w-6 h-6 mb-1" fill={active?"currentColor":"none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            CheckCircle: ({checked}) => (
                <svg className={`w-7 h-7 ${checked ? 'text-emerald-500' : 'text-gray-300'}`} fill={checked ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" strokeWidth="2" />
                    {checked && <path stroke="white" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4" />}
                </svg>
            ),
            Calendar: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        };

        const TASK_META = {
            ventilate: { title: '환기', icon: Icons.Wind, color: 'text-blue-500', dot: 'bg-blue-400', cycle: 7 },
            nutrient: { title: '영양', icon: Icons.Pill, color: 'text-green-500', dot: 'bg-green-500', cycle: 90 },
            repot: { title: '분갈이', icon: Icons.Shovel, color: 'text-amber-700', dot: 'bg-amber-700', cycle: 365 },
            spray: { title: '분무', icon: Icons.Spray, color: 'text-cyan-400', dot: 'bg-cyan-400', cycle: 3 },
            water: { title: '물주기', icon: Icons.Water, color: 'text-blue-400', dot: 'bg-blue-600', cycle: 14 }
        };

        // --- 유틸 함수 ---
        const safeJSONParse = (str, fallback) => {
            if (!str) return fallback;
            try { return JSON.parse(str); } catch (e) { return fallback; }
        };

        const calculateDiffDays = (dateStr) => {
            if (!dateStr) return 0;
            const targetDate = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            targetDate.setHours(0, 0, 0, 0);
            const diffTime = targetDate.getTime() - today.getTime();
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const calculateDday = (dateStr) => {
            if (!dateStr) return '';
            const start = new Date(dateStr);
            const today = new Date();
            start.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);
            const diffTime = today.getTime() - start.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            return diffDays <= 0 ? 'DAY 1' : `D+${diffDays}`;
        };

        const parseWeather = (code) => {
            if (code <= 3) return { desc: '맑음/구름조금', icon: '☀️' };
            if (code <= 48) return { desc: '흐림/안개', icon: '☁️' };
            if (code <= 67) return { desc: '비 조금', icon: '🌦️' };
            if (code <= 77) return { desc: '눈', icon: '❄️' };
            if (code <= 82) return { desc: '비', icon: '🌧️' };
            return { desc: '흐림/비', icon: '☔' };
        };

        // --- 달력 계산 유틸 ---
        const getCalendarDays = (year, month) => {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null); 
            for (let i = 1; i <= daysInMonth; i++) days.push(i);
            return days;
        };

        // --- 컴포넌트 ---

        const CustomAlert = ({ isOpen, message, onClose, type = 'success' }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-40 fade-in p-4">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl slide-up text-center">
                        <div className={`mx-auto w-12 h-12 rounded-full flex items-center justify-center mb-4 ${type === 'success' ? 'bg-emerald-100 text-emerald-500' : 'bg-red-100 text-red-500'}`}>
                            {type === 'success' ? (
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                            ) : (
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            )}
                        </div>
                        <p className="text-gray-800 font-medium mb-6 whitespace-pre-line">{message}</p>
                        <button onClick={onClose} className={`w-full py-3 rounded-xl font-bold text-white transition-colors ${type === 'success' ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-gray-800 hover:bg-gray-900'}`}>
                            확인
                        </button>
                    </div>
                </div>
            );
        };

        const CustomConfirm = ({ isOpen, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black bg-opacity-40 fade-in p-4">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl slide-up text-center">
                        <div className="mx-auto w-12 h-12 rounded-full flex items-center justify-center mb-4 bg-emerald-100 text-emerald-500">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <p className="text-gray-800 font-medium mb-6 whitespace-pre-line">{message}</p>
                        <div className="flex space-x-3">
                            <button onClick={onCancel} className="flex-1 py-3 rounded-xl font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors">취소</button>
                            <button onClick={onConfirm} className="flex-1 py-3 rounded-xl font-bold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors">실행하기</button>
                        </div>
                    </div>
                </div>
            );
        };

        const GuideModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            const scriptCode = `// ✨ 이 함수를 실행하여 구글 드라이브 '파일 생성' 권한을 확실하게 부여받습니다!
function setup() {
  var temp = DriveApp.createFile("퍼릇_권한테스트.txt", "이 파일은 삭제하셔도 됩니다.");
  temp.setTrashed(true); 
  console.log("✅ 구글 드라이브 권한 완벽 허용 완료! 이제 앱에서 사진 저장이 가능합니다.");
}

function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var pSheet = ss.getSheetByName('Plants');
  var plants = [];
  
  if (pSheet) {
    var pValues = pSheet.getDataRange().getValues();
    for (var i = 1; i < pValues.length; i++) {
      plants.push({
        id: pValues[i][1], name: pValues[i][2], location: pValues[i][3], potType: pValues[i][4],
        cycles: pValues[i][5], tasks: pValues[i][6], imageUrl: pValues[i][7], createdAt: pValues[i][8],
        photos: pValues[i][9], aiGuide: pValues[i][10]
      });
    }
  }

  var nSheet = ss.getSheetByName('Notes');
  var notes = [];
  if (nSheet) {
    var nValues = nSheet.getDataRange().getValues();
    for (var j = 1; j < nValues.length; j++) {
      notes.push({
        id: nValues[j][0], plantId: nValues[j][1], date: nValues[j][2], content: nValues[j][3]
      });
    }
  }

  return ContentService.createTextOutput(JSON.stringify({plants: plants, notes: notes})).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    
    // ✨ 0. AI 진단 요청인 경우
    if (data.recordType === 'ai_query') {
      var API_KEYS = [
        "여기에_첫번째_API_키를_넣으세요",
        "여기에_두번째_API_키를_넣으세요_없으면_지우세요"
      ];
      var MODELS = ["gemini-2.5-flash", "gemini-2.5-flash-lite"];

      var parts = [{ text: data.prompt }];
      if (data.imageBase64 && data.imageBase64.indexOf('data:image') === 0) {
        var base64Data = data.imageBase64.split(',')[1];
        var mimeType = data.imageBase64.substring(5, data.imageBase64.indexOf(';'));
        parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
      }

      var payload = {
        contents: [{ parts: parts }],
        systemInstruction: { parts: [{ text: data.systemInstruction || "You are a helpful assistant." }] }
      };

      var options = { method: "post", contentType: "application/json", payload: JSON.stringify(payload), muteHttpExceptions: true };
      
      var replyText = "응답을 받을 수 없습니다.";
      var success = false;

      for (var i = 0; i < API_KEYS.length; i++) {
        if (success) break;
        var key = API_KEYS[i].trim();
        if (!key || key.indexOf("여기에_") !== -1) continue;

        for (var j = 0; j < MODELS.length; j++) {
          if (success) break;
          var model = MODELS[j];
          var url = "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + key;
          
          var response = UrlFetchApp.fetch(url, options);
          var responseCode = response.getResponseCode();
          var json = JSON.parse(response.getContentText());

          if (responseCode === 200 && json.candidates && json.candidates.length > 0) {
            replyText = json.candidates[0].content.parts[0].text;
            success = true;
          } else {
            replyText = "⚠️ AI 오류 (" + model + "): " + (json.error ? json.error.message : "한도 초과");
          }
        }
      }
      return ContentService.createTextOutput(JSON.stringify({"result": "success", "text": replyText})).setMimeType(ContentService.MimeType.JSON);
    }

    // ✨ 1. 식물 삭제 요청
    if (data.recordType === 'delete_plant') {
      var sheet = ss.getSheetByName('Plants');
      if (sheet) {
        var values = sheet.getDataRange().getValues();
        for (var i = 1; i < values.length; i++) {
          if (values[i][1] == data.plantId) {
            sheet.deleteRow(i + 1);
            break;
          }
        }
      }
      return ContentService.createTextOutput(JSON.stringify({"result": "deleted"})).setMimeType(ContentService.MimeType.JSON);
    }

    // ✨ 2. 노트 추가 요청
    if (data.recordType === 'add_note') {
      var sheet = ss.getSheetByName('Notes');
      if (!sheet) {
        sheet = ss.insertSheet('Notes');
        sheet.appendRow(['NoteID', 'PlantID', 'Date', 'Content']);
      }
      sheet.appendRow([data.note.id, data.note.plantId, data.note.date, data.note.content]);
      return ContentService.createTextOutput(JSON.stringify({"result": "success"})).setMimeType(ContentService.MimeType.JSON);
    }

    // ✨ 3. 노트 삭제 요청
    if (data.recordType === 'delete_note') {
      var sheet = ss.getSheetByName('Notes');
      if (sheet) {
        var values = sheet.getDataRange().getValues();
        for (var i = 1; i < values.length; i++) {
          if (values[i][0] == data.noteId) {
            sheet.deleteRow(i + 1);
            break;
          }
        }
      }
      return ContentService.createTextOutput(JSON.stringify({"result": "deleted"})).setMimeType(ContentService.MimeType.JSON);
    }

    var imageUrl = data.imageBase64 || "";
    var FOLDER_ID = "1sZ2X_BVQpzf0scq-fVccDxGYRw_N4rHX"; 

    // 📸 4-1. 구글 드라이브 이미지 업로드 (메인 프로필 사진 - 썸네일 API 방식으로 변경!)
    if (data.imageBase64 && data.imageBase64.indexOf('data:image') === 0) {
      if (FOLDER_ID && FOLDER_ID !== "여기에_구글드라이브_폴더_ID를_넣으세요") {
        try {
          var folder = DriveApp.getFolderById(FOLDER_ID);
          var contentType = data.imageBase64.substring(5, data.imageBase64.indexOf(';'));
          var bytes = Utilities.base64Decode(data.imageBase64.split(',')[1]);
          var blob = Utilities.newBlob(bytes, contentType, data.plantName + "_profile_" + new Date().getTime());
          var file = folder.createFile(blob);
          file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
          
          // ✨ 수정됨: 미리보기(Thumbnail) URL로 저장하여 화면에 잘 보이도록 변경
          imageUrl = "https://drive.google.com/thumbnail?id=" + file.getId() + "&sz=w1000";
        } catch(driveError) { 
          imageUrl = "업로드실패_" + driveError.message;
        }
      } else {
        imageUrl = "업로드실패_폴더ID미입력";
      }
    }

    // 📸 4-2. 구글 드라이브 이미지 업로드 (성장 앨범 사진 배열 - 썸네일 API 방식으로 변경!)
    if (data.photos && Array.isArray(data.photos)) {
      for (var k = 0; k < data.photos.length; k++) {
        if (data.photos[k].url && data.photos[k].url.indexOf('data:image') === 0) {
          if (FOLDER_ID && FOLDER_ID !== "여기에_구글드라이브_폴더_ID를_넣으세요") {
            try {
              var folder = DriveApp.getFolderById(FOLDER_ID);
              var pContentType = data.photos[k].url.substring(5, data.photos[k].url.indexOf(';'));
              var pBytes = Utilities.base64Decode(data.photos[k].url.split(',')[1]);
              var pBlob = Utilities.newBlob(pBytes, pContentType, data.plantName + "_album_" + new Date().getTime() + "_" + k);
              var pFile = folder.createFile(pBlob);
              pFile.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
              
              // ✨ 수정됨: 미리보기(Thumbnail) URL로 저장하여 화면에 잘 보이도록 변경
              data.photos[k].url = "https://drive.google.com/thumbnail?id=" + pFile.getId() + "&sz=w1000"; 
            } catch(driveError) { 
              data.photos[k].url = "업로드실패_" + driveError.message;
            }
          } else {
            data.photos[k].url = "업로드실패_폴더ID미입력";
          }
        }
      }
    }

    // 5. 식물 정보 DB 업데이트 (시트2: Plants)
    if (data.recordType === 'plant') {
      var sheet = ss.getSheetByName('Plants');
      if (!sheet) sheet = ss.insertSheet('Plants');
      
      if (sheet.getLastRow() === 0) {
        sheet.appendRow(['Timestamp', '식물ID', '식물명', '키우는곳', '화분종류', '주기(JSON)', '예정일(JSON)', '사진URL', '생성일', '앨범(JSON)', 'AI가이드']);
      }
      
      var values = sheet.getDataRange().getValues();
      var isUpdated = false;
      var photosJson = data.photos ? JSON.stringify(data.photos) : "[]";
      var aiGuideText = data.aiGuide || "";

      for (var i = 1; i < values.length; i++) {
        if (values[i][1] == data.plantId) {
          sheet.getRange(i+1, 1, 1, 11).setValues([[
            data.timestamp, data.plantId, data.plantName, data.location, data.potType,
            JSON.stringify(data.cycles), JSON.stringify(data.tasks), imageUrl, data.createdAt, photosJson, aiGuideText
          ]]);
          isUpdated = true; break;
        }
      }
      if (!isUpdated) {
        sheet.appendRow([
          data.timestamp, data.plantId, data.plantName, data.location, data.potType,
          JSON.stringify(data.cycles), JSON.stringify(data.tasks), imageUrl, data.createdAt, photosJson, aiGuideText
        ]);
      }
    } 
    // 6. 일반 행동 로그 전송 (시트1: History)
    else if (data.recordType === 'log') {
      var sheet = ss.getSheetByName('History');
      if (!sheet) sheet = ss.insertSheet('History');
      if (sheet.getLastRow() === 0) sheet.appendRow(["Timestamp", "식물명", "할일유형", "액션(완료/미루기)"]);
      sheet.appendRow([data.timestamp, data.plantName, data.taskType, data.action]);
    }
    
    return ContentService.createTextOutput(JSON.stringify({
      "result": "success", 
      "imageUrl": imageUrl,
      "photos": data.photos || []
    })).setMimeType(ContentService.MimeType.JSON);
  } catch(error) {
    return ContentService.createTextOutput(JSON.stringify({"error": error.message})).setMimeType(ContentService.MimeType.JSON);
  }
}`;
            return (
                <div className="fixed inset-0 z-[90] bg-black bg-opacity-50 flex items-center justify-center p-4 fade-in">

                            </button>

                                <li>해당 폴더 주소의 끝부분(<strong className="text-red-500">폴더 ID</strong>)이 이미 코드에 입력되어 있습니다. API 키만 추가로 넣어주세요.</li>
                                <li><strong className="text-purple-600">다수의 Gemini API 키</strong>를 쉼표로 구분하여 <code className="bg-gray-100 px-1 rounded text-purple-600">API_KEYS</code> 배열에 여러 개 넣습니다.</li>
                                <li>변경된 아래 <strong>전체 코드를 복사</strong>하여 구글 스크립트 편집기에 <strong className="text-red-500">완전히 덮어쓰기</strong> 합니다.</li>
                                <li className="bg-red-50 p-2 rounded border border-red-100"><strong className="text-red-600">가장 중요 ⭐:</strong> 스크립트 편집기 상단 중앙의 함수 선택 박스에서 <strong className="text-red-600">`setup` 함수를 선택하고 [▷ 실행] 버튼을 눌러주세요.</strong> 팝업창이 뜨면 권한 검토를 눌러 접근을 허용해야 사진이 업로드됩니다!</li>

                                    1. 다음으로 실행(Execute as): <strong>'나(Me)'</strong><br/>

        const Intro = ({ onFinish }) => {

            return (
                <div className="fixed inset-0 bg-emerald-500 z-[200] flex flex-col items-center justify-center fade-in">
                    <h1 className="text-5xl font-extrabold text-white tracking-tighter mb-2">Purut</h1>
                    <p className="text-emerald-100 text-sm">스마트한 반려식물 관리</p>
                    <div className="absolute bottom-10 text-emerald-200 text-xs font-medium tracking-widest uppercase opacity-80">
                        Created by Yang DH
                    </div>
                </div>
            );
        };

        const App = () => {
            // ✨ 1. 나만의 비밀번호 설정 (원하는 숫자로 변경하세요!)
            const SECRET_PASSWORD = "1004"; 

            // ✨ 2. 로그인 상태 관리
            const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('groo_logged_in') === 'true');
            const [inputPw, setInputPw] = useState('');
            const [pwError, setPwError] = useState(false);

            const [showIntro, setShowIntro] = useState(true);
            const [view, setView] = useState('today'); // today, plants, note, guide, mypage
            const [todayTab, setTodayTab] = useState('today'); 
            const [plants, setPlants] = useState([]);
            const [notes, setNotes] = useState([]); 
            const [actionHistory, setActionHistory] = useState([]); 
            const [weather, setWeather] = useState(null); 
            const [alertData, setAlertData] = useState({ isOpen: false, message: '', type: 'success' });
            const [confirmData, setConfirmData] = useState({ isOpen: false, message: '', onConfirm: null });
            const [isGuideOpen, setIsGuideOpen] = useState(false);
            const [loadingTask, setLoadingTask] = useState(null);
            
            // 데이터 로딩 상태
            const [isSyncing, setIsSyncing] = useState(false); 

            // AI 기능 관련 상태
            const [guideForm, setGuideForm] = useState({ plantId: '', query: '', imageBase64: null });
            const [guideResponse, setGuideResponse] = useState('');
            const [isAILoadingGuide, setIsAILoadingGuide] = useState(false);
            
            const [guideMode, setGuideMode] = useState('diagnose');
            const [searchPlantName, setSearchPlantName] = useState('');
            const [searchResponse, setSearchResponse] = useState('');
            const [isAILoadingSearch, setIsAILoadingSearch] = useState(false);
            const [isAILoadingTip, setIsAILoadingTip] = useState(false);
            
            const [isAILoadingCycle, setIsAILoadingCycle] = useState(false);
            const [isSavingPlant, setIsSavingPlant] = useState(false);

            // 🔔 알림(Notification) 상태
            const [isNotiOpen, setIsNotiOpen] = useState(false);
            const [notifications, setNotifications] = useState([]);

            const defC = { water: 14, ventilate: 7, spray: 3, nutrient: 90, repot: 365 };
            const todayStr = new Date().toISOString().split('T')[0];
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [newPlantForm, setNewPlantForm] = useState({ nickname: '', species: '', photo: '🌱', imageBase64: null, location: '거실', potType: '토분', lastWatered: todayStr, cycles: { ...defC } });
            
            const [editingPlant, setEditingPlant] = useState(null); 
            const [detailTab, setDetailTab] = useState('info'); 

            // 달력용 상태
            const [calDate, setCalDate] = useState(new Date());
            const [selectedCalDate, setSelectedCalDate] = useState(todayStr);

            // 노트 입력 상태
            const [newNoteContent, setNewNoteContent] = useState('');
            const [selectedPlantForNote, setSelectedPlantForNote] = useState('');

            // 실행 취소(Undo) 상태 관리
            const [undoData, setUndoData] = useState({ show: false, plantId: null, taskType: null, oldDate: null, timerId: null, plantName: '', actionName: '' });

            // ✨ 알림(Notification) 자동 생성 로직
            useEffect(() => {
                if (plants.length === 0) {
                    setNotifications(prev => prev.some(n => n.id === 'welcome') ? prev : [{ id: 'welcome', text: "🌱 Purut에 오신 것을 환영합니다! 새 식물을 등록해보세요.", time: "방금 전", isRead: false }]);
                    return;
                }

                const generatedNotis = [];
                let hasTask = false;

                const getTaskEmoji = (taskType) => {
                    switch(taskType) {
                        case 'water': return '💧';
                        case 'ventilate': return '💨';
                        case 'spray': return '💦';
                        case 'nutrient': return '💊';
                        case 'repot': return '🪴';
                        default: return '✨';
                    }
                };

                plants.forEach(plant => {
                    Object.entries(plant.tasks).forEach(([taskType, dateStr]) => {
                        const diff = calculateDiffDays(dateStr);
                        if (diff <= 0) {
                            hasTask = true;
                            const meta = TASK_META[taskType];
                            generatedNotis.push({
                                id: `${plant.id}-${taskType}`,
                                text: `${getTaskEmoji(taskType)} [${plant.name}] ${meta.title} 관리가 필요해요!`,
                                time: diff === 0 ? '오늘' : `${Math.abs(diff)}일 지남`,
                                isRead: false
                            });
                        }
                    });
                });

                if (!hasTask) {
                    generatedNotis.push({
                        id: 'all-clear',
                        text: "🌿 오늘은 식물들이 모두 건강하게 잘 쉬고 있어요!",
                        time: "방금 전",
                        isRead: false
                    });
                }

                setNotifications(prev => {
                    return generatedNotis.map(newNoti => {
                        const existing = prev.find(p => p.id === newNoti.id);
                        return existing ? { ...newNoti, isRead: existing.isRead } : newNoti;
                    });
                });
            }, [plants]);


            // ✨ 구글 시트에서 최신 '식물'과 '노트' 데이터를 완벽하게 불러오는 함수
            const loadDataFromSheet = async () => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("여기에_")) return;
                setIsSyncing(true);
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL);
                    const data = await res.json();
                    
                    // 식물 데이터 로드 및 적용
                    if (data.plants && data.plants.length > 0) {
                        const loadedPlants = data.plants.map(item => ({
                            id: Number(item.id),
                            name: item.name,
                            location: item.location,
                            potType: item.potType,
                            cycles: safeJSONParse(item.cycles, { ...defC }),
                            tasks: safeJSONParse(item.tasks, {}),
                            photos: safeJSONParse(item.photos, []),
                            aiGuide: item.aiGuide || '', 
                            imageBase64: item.imageUrl,
                            createdAt: item.createdAt,
                            photo: item.imageUrl && !item.imageUrl.includes('업로드실패') ? '' : '🌱',
                            color: 'bg-green-100' 
                        }));
                        setPlants(loadedPlants); 
                        localStorage.setItem('groo_plants', JSON.stringify(loadedPlants)); 
                    }

                    // ✨ 노트 데이터 로드 및 적용
                    if (data.notes && data.notes.length > 0) {
                        const loadedNotes = data.notes.map(item => ({
                            id: Number(item.id),
                            plantId: Number(item.plantId),
                            date: item.date,
                            content: item.content
                        })).sort((a, b) => b.id - a.id); // 최신순 정렬
                        setNotes(loadedNotes);
                        localStorage.setItem('groo_notes', JSON.stringify(loadedNotes));
                    }
                } catch (error) {
                    console.error("데이터 동기화 실패:", error);
                } finally {
                    setIsSyncing(false);
                }
            };

            // 초기 앱 시작 시 데이터 로드
            useEffect(() => {
                if(!isLoggedIn) return;

                const savedPlants = localStorage.getItem('groo_plants');
                if (savedPlants) setPlants(JSON.parse(savedPlants));
                
                const savedNotes = localStorage.getItem('groo_notes');
                if (savedNotes) setNotes(JSON.parse(savedNotes));
                
                const savedHistory = localStorage.getItem('groo_history');
                if (savedHistory) setActionHistory(JSON.parse(savedHistory));
                
                loadDataFromSheet();

                const fetchWeather = async (lat, lon) => {
                    try {
                        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                        const data = await res.json();
                        const wInfo = parseWeather(data.current_weather.weathercode);
                        setWeather({ ...wInfo, temp: data.current_weather.temperature });
                    } catch(e) { console.log("날씨 정보를 불러올 수 없습니다."); }
                };
                
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
                        () => fetchWeather(37.5665, 126.9780)
                    );
                } else {
                    fetchWeather(37.5665, 126.9780);
                }
            }, [isLoggedIn]);

            useEffect(() => {
                localStorage.setItem('groo_history', JSON.stringify(actionHistory));

            const showAlert = (message, type = 'success') => setAlertData({ isOpen: true, message, type });

            const handleImageUpload = (e, setFormCallback) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const base64 = canvas.toDataURL('image/jpeg', 0.8);
                        setFormCallback(prev => ({ ...prev, imageBase64: base64 }));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // ✨ 성장 앨범 사진 업로드 기능 (진짜 원인 알림창 탑재)
            const handleAlbumUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const base64 = canvas.toDataURL('image/jpeg', 0.8);
                        
                        // 로컬 임시로 화면에 먼저 띄우기 위해 base64 주소를 사용
                        const newPhotoObj = { date: new Date().toISOString().split('T')[0], url: base64 };
                        const updatedPhotos = [...(editingPlant.photos || []), newPhotoObj];
                        const updatedPlant = { ...editingPlant, photos: updatedPhotos };
                        
                        setEditingPlant(updatedPlant);
                        setPlants(prev => prev.map(p => p.id === updatedPlant.id ? updatedPlant : p));
                        
                        // 서버로 전송 (이때 서버가 base64를 구글 드라이브 주소로 바꿔서 돌려줍니다!)
                        setIsSavingPlant(true);
                        const syncResult = await syncPlantToSheet(updatedPlant);
                        setIsSavingPlant(false);

                        // 서버가 보내준 URL 배열로 로컬 데이터 교체
                        if (syncResult && syncResult.photos) {
                            // ✨ 사진 저장 실패 시 "진짜 원인"을 화면에 띄웁니다!
                            const errorItem = syncResult.photos.find(p => p.url && p.url.includes('업로드실패'));

            const handleDeletePhoto = async (indexToDelete) => {

                    onConfirm: async () => {
                        const updatedPhotos = editingPlant.photos.filter((_, idx) => idx !== indexToDelete);
                        const updatedPlant = { ...editingPlant, photos: updatedPhotos };
                        
                        setEditingPlant(updatedPlant);
                        setPlants(prev => prev.map(p => p.id === updatedPlant.id ? updatedPlant : p));
                        
                        setIsSavingPlant(true);
                        await syncPlantToSheet(updatedPlant);
                        setIsSavingPlant(false);

                    }

            const logActionToSheet = async (plantName, taskType, action) => {

                try {
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify({
                            recordType: 'log',
                            timestamp: new Date().toLocaleString('ko-KR'),
                            plantName,
                            taskType: TASK_META[taskType] ? TASK_META[taskType].title : taskType,
                            action
                        })
                    });
                    return true;
                } catch (error) { return false; }
            };

            const syncPlantToSheet = async (plant) => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("여기에_")) return { success: true };
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            recordType: 'plant',
                            timestamp: new Date().toLocaleString('ko-KR'),
                            plantId: plant.id,
                            plantName: plant.name,
                            location: plant.location || '미지정',
                            potType: plant.potType || '미지정',
                            cycles: plant.cycles || {},
                            tasks: plant.tasks || {},
                            photos: plant.photos || [],
                            aiGuide: plant.aiGuide || '', 
                            createdAt: plant.createdAt,
                            imageBase64: plant.imageBase64 
                        })
                    });
                    const result = await response.json();
                    return result;
                } catch (error) { return { error: error.message }; }
            };

            const deletePlantFromSheet = async (plantId) => {
                if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("여기에_")) return;
                try {
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ recordType: 'delete_plant', plantId: plantId })
                    });
                } catch (error) { console.error(error); }
            };

            const handleTaskAction = async (plantId, taskType, action) => {
                const plant = plants.find(p => p.id === plantId);
                const taskKey = `${plantId}-${taskType}`;
                setLoadingTask(taskKey);
                const oldDate = plant.tasks[taskType]; 

                let newPlantObj = null;
                const newPlants = plants.map(p => {
                    if (p.id === plantId) {
                        const today = new Date();
                        const nextD = new Date(today);
                        if (action === 'delay') {
                            nextD.setDate(today.getDate() + 1); 
                        } else {
                            const customCycle = (p.cycles && p.cycles[taskType]) ? Number(p.cycles[taskType]) : TASK_META[taskType].cycle;
                            nextD.setDate(today.getDate() + customCycle);
                        }
                        newPlantObj = { ...p, tasks: { ...p.tasks, [taskType]: nextD.toISOString().split('T')[0] } };
                        return newPlantObj;
                    }
                    return p;
                });
                
                setPlants(newPlants);

                logActionToSheet(plant.name, taskType, action);
                if (newPlantObj) syncPlantToSheet(newPlantObj); 
                
                setTimeout(() => {
                    setLoadingTask(null);
                    if (action === 'complete') {
                        const newAction = { id: Date.now(), plantId, date: new Date().toISOString(), content: `${TASK_META[taskType].title} 완료`, type: 'action' };
                        setActionHistory(prev => [newAction, ...prev]);
                    }

                    if (action === 'complete' || action === 'delay') {
                        if (undoData.timerId) clearTimeout(undoData.timerId);
                        const timerId = setTimeout(() => setUndoData(prev => ({ ...prev, show: false })), 5000); 
                        setUndoData({ show: true, plantId, taskType, oldDate, plantName: plant.name, actionName: action === 'complete' ? '완료' : '미루기', timerId });
                    }
                }, 100); 
            };

            const handleCompleteAllTasks = (taskType, tasksToComplete) => {
                const updatedPlants = [...plants];
                
                for (let { plant } of tasksToComplete) {
                    const targetIdx = updatedPlants.findIndex(p => p.id === plant.id);
                    if (targetIdx !== -1) {
                        const nextD = new Date();
                        const customCycle = (plant.cycles && plant.cycles[taskType]) ? Number(plant.cycles[taskType]) : TASK_META[taskType].cycle;
                        nextD.setDate(nextD.getDate() + customCycle);
                        updatedPlants[targetIdx] = {
                            ...updatedPlants[targetIdx],
                            tasks: { ...updatedPlants[targetIdx].tasks, [taskType]: nextD.toISOString().split('T')[0] }
                        };
                    }
                }
                
                setPlants(updatedPlants);
                showAlert(`${TASK_META[taskType].title} 항목을 모두 완료 처리했습니다!`, 'success');

                tasksToComplete.forEach(({ plant }) => {
                    logActionToSheet(plant.name, taskType, 'complete');
                    const syncedPlant = updatedPlants.find(p => p.id === plant.id);
                    if (syncedPlant) syncPlantToSheet(syncedPlant);
                    
                    const newAction = { id: Date.now() + Math.random(), plantId: plant.id, date: new Date().toISOString(), content: `${TASK_META[taskType].title} 완료`, type: 'action' };
                    setActionHistory(prev => [newAction, ...prev]);
                });
            };

            const handleUndo = async () => {
                if (!undoData.show) return;
                const { plantId, taskType, oldDate, plantName, actionName, timerId } = undoData;
                clearTimeout(timerId); 
                
                let restoredPlant = null;
                setPlants(prev => prev.map(p => {
                    if (p.id === plantId) {
                        restoredPlant = { ...p, tasks: { ...p.tasks, [taskType]: oldDate } };
                        return restoredPlant;
                    }
                    return p;
                }));

                setUndoData(prev => ({ ...prev, show: false }));
                logActionToSheet(plantName, taskType, `${actionName} 취소`);

            };

            const handleRecommendCycle = async () => {
                if (!newPlantForm.species.trim()) return showAlert('식물 종류를(예: 몬스테라) 먼저 정확히 입력해주세요.', 'error');
                
                setIsAILoadingCycle(true);
                try {
                    const systemPrompt = `당신은 원예 전문가입니다. 사용자가 입력한 식물 품종에 알맞은 평균 관리 주기(일 단위)를 JSON 형식으로만 반환하세요.
형식: {"water": 14, "ventilate": 7, "spray": 3, "nutrient": 90, "repot": 365}`;
                    const userPrompt = `식물 종류: ${newPlantForm.species}\n위 식물의 실내 기준 적절한 관리 주기를 JSON으로 알려줘.`;
                    
                    const response = await callGeminiAPI(userPrompt, systemPrompt);

                    const recommendedCycles = JSON.parse(jsonStr);

                    setNewPlantForm(prev => ({
                        ...prev,
                        cycles: {
                            ...prev.cycles,
                            water: recommendedCycles.water || prev.cycles.water,
                            ventilate: recommendedCycles.ventilate || prev.cycles.ventilate,
                            spray: recommendedCycles.spray || prev.cycles.spray,
                            nutrient: recommendedCycles.nutrient || prev.cycles.nutrient,
                            repot: recommendedCycles.repot || prev.cycles.repot

                    showAlert(`✨ ${newPlantForm.species}에 딱 맞는 주기를 불러왔어요!`, 'success');

                    showAlert('주기를 불러오는 데 실패했습니다. 직접 입력해주세요.', 'error');

                    setIsAILoadingCycle(false);
                }

            const handleGeneratePlantGuide = async () => {

                    const userPrompt = `식물 종류: ${speciesName}\n이 식물의 맞춤형 관리 핵심 요약 가이드를 작성해줘.`;

                } catch (error) {

                    showAlert('가이드를 생성하는 중 오류가 발생했습니다.', 'error');
                } finally {
                    setIsSavingPlant(false);
                }
            };

            const handleAddPlant = async () => {
                if (!newPlantForm.species.trim()) return showAlert('식물 종류를 입력해주세요.', 'error');
                
                const finalPlantName = newPlantForm.nickname.trim() ? `${newPlantForm.nickname} (${newPlantForm.species})` : newPlantForm.species;

                const lastWateredDate = new Date(newPlantForm.lastWatered);
                const nextWaterDate = new Date(lastWateredDate);
                nextWaterDate.setDate(lastWateredDate.getDate() + Number(newPlantForm.cycles.water));
                
                const nextVentilateDate = new Date(today); nextVentilateDate.setDate(today.getDate() + Number(newPlantForm.cycles.ventilate));
                const nextSprayDate = new Date(today); nextSprayDate.setDate(today.getDate() + Number(newPlantForm.cycles.spray));
                const nextNutrientDate = new Date(today); nextNutrientDate.setDate(today.getDate() + Number(newPlantForm.cycles.nutrient));
                const nextRepotDate = new Date(today); nextRepotDate.setDate(today.getDate() + Number(newPlantForm.cycles.repot));
                
                const newPlant = {
                    id: Date.now(),

                    photo: newPlantForm.photo,
                    imageBase64: newPlantForm.imageBase64, 
                    location: newPlantForm.location,
                    potType: newPlantForm.potType,
                    color: 'bg-green-100',
                    createdAt: today.toISOString().split('T')[0],
                    cycles: { ...newPlantForm.cycles },
                    tasks: {

                        ventilate: nextVentilateDate.toISOString().split('T')[0],

                        nutrient: nextNutrientDate.toISOString().split('T')[0],
                        repot: nextRepotDate.toISOString().split('T')[0],

                    photos: [],

                setPlants([...plants, newPlant]);
                setIsAddModalOpen(false);
                setNewPlantForm({ nickname: '', species: '', photo: '🌱', imageBase64: null, location: '거실', potType: '토분', lastWatered: todayStr, cycles: { ...defC } });
                showAlert(`${newPlant.name}이(가) 추가되었습니다.`, 'success');

                logActionToSheet(newPlant.name, 'water', '새 식물 등록');
                const syncResult = await syncPlantToSheet(newPlant);
                if (syncResult && GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.includes("여기에_")) {

                            const exactErrorMsg = syncResult.imageUrl.split('_')[1] || "권한/ID 설정 오류";
                            showAlert(`프로필 사진 저장 실패!\n원인: ${exactErrorMsg}\n\nDB 가이드를 꼭 확인해주세요.`, 'error');
                        }
                        newPlant.imageBase64 = syncResult.imageUrl; 
                        needsUpdate = true; 
                    }
                    if (syncResult.photos) { 
                        newPlant.photos = syncResult.photos; 
                        needsUpdate = true; 
                    }
                    if (needsUpdate) {
                        setPlants(prev => prev.map(p => p.id === newPlant.id ? newPlant : p));
                    }
                }
            };

            const handleSavePlant = async () => {
                if (!editingPlant.name.trim()) return showAlert('식물 이름을 입력해주세요.', 'error');
                
                const updatedPlant = { ...editingPlant };
                setPlants(prev => prev.map(p => p.id === updatedPlant.id ? updatedPlant : p));
                setEditingPlant(null);
                showAlert(`${updatedPlant.name}의 설정이 저장되었습니다.`, 'success');

                logActionToSheet(updatedPlant.name, '설정 변경', '주기/정보 수정됨');
                const syncResult = await syncPlantToSheet(updatedPlant);
                if (syncResult) {
                    let needsUpdate = false;
                    if (syncResult.imageUrl && syncResult.imageUrl !== updatedPlant.imageBase64) {
                        if (syncResult.imageUrl.includes('업로드실패')) {
                            const exactErrorMsg = syncResult.imageUrl.split('_')[1] || "권한/ID 설정 오류";
                            showAlert(`프로필 사진 저장 실패!\n원인: ${exactErrorMsg}\n\nDB 가이드를 꼭 확인해주세요.`, 'error');
                        }
                        updatedPlant.imageBase64 = syncResult.imageUrl; 
                        needsUpdate = true;
                    }
                    if (syncResult.photos) {
                        updatedPlant.photos = syncResult.photos; 
                        needsUpdate = true;
                    }
                    if (needsUpdate) {
                        setPlants(prev => prev.map(p => p.id === updatedPlant.id ? updatedPlant : p));
                    }
                }
            };

            const handleDeleteClick = (plant) => {
                setConfirmData({
                    isOpen: true,
                    message: `정말 '${plant.name}'을(를) 삭제하시겠습니까?\n(작성된 노트도 함께 삭제됩니다)`,
                    onConfirm: async () => {
                        setPlants(prev => prev.filter(p => p.id !== plant.id));
                        setNotes(prev => prev.filter(n => n.plantId !== plant.id)); 
                        setActionHistory(prev => prev.filter(h => h.plantId !== plant.id)); 
                        setEditingPlant(null);
                        showAlert(`${plant.name}이(가) 삭제되었습니다.`, 'error');
                        
                        logActionToSheet(plant.name, '식물 삭제', '데이터 삭제됨');
                        deletePlantFromSheet(plant.id);
                    }
                });
            };

            // ✨ 노트 작성 및 서버 전송 (동기화)
            const handleAddNote = () => {
                if (!selectedPlantForNote) return showAlert('노트를 작성할 식물을 선택해주세요.', 'error');
                if (!newNoteContent.trim()) return showAlert('내용을 입력해주세요.', 'error');

                };

                setNewNoteContent('');

                // 백그라운드 구글 시트 저장
                if (GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.includes("여기에_")) {
                    fetch(GOOGLE_SCRIPT_URL, {

                        body: JSON.stringify({ recordType: 'add_note', note: newNote })
                    }).catch(console.error);
                }
            };

            // ✨ 개별 노트 삭제 핸들러
            const handleDeleteNote = (noteId) => {
                setNotes(notes.filter(n => n.id !== noteId));
                // 백그라운드 구글 시트 삭제 명령
                if (GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.includes("여기에_")) {

                    }).catch(console.error);

                    onConfirm: () => {
                        localStorage.removeItem('groo_plants');
                        localStorage.removeItem('groo_notes');
                        localStorage.removeItem('groo_history');
                        localStorage.removeItem('groo_logged_in'); // 로그아웃 처리

                        setNotes([]);
                        setActionHistory([]);

                        setView('today');
                    }
                });

            const handleGuideQuery = async () => {
                if (!guideForm.plantId) return showAlert('상담할 식물을 선택해주세요.', 'error');
                if (!guideForm.query.trim()) return showAlert('궁금한 점이나 식물의 증상을 입력해주세요.', 'error');

                setIsAILoadingGuide(true);

                    if (guideForm.imageBase64) {
                        systemPrompt += " 사용자가 식물의 사진을 함께 첨부했습니다. 첨부된 사진을 주의 깊게 분석하여 눈에 보이는 증상을 기반으로 맞춤화된 진단을 내려주세요.";
                    }
                    const userPrompt = `식물 애칭: ${plant.name}, 키우는 곳: ${plant.location || '알 수 없음'}, 화분 종류: ${plant.potType || '알 수 없음'}. \n\n[현재 증상 및 질문]\n${guideForm.query}`;

            const handleSearchPlantInfo = async () => {

                setIsAILoadingSearch(true);

                    const response = await callGeminiAPI(userPrompt, systemPrompt);

                } finally {
                    setIsAILoadingSearch(false);
                }
            };

            const handleTodayTip = async () => {
                setIsAILoadingTip(true);
                try {
                    const systemPrompt = "당신은 센스있는 식물 관리사입니다. 다정한 관리 꿀팁을 딱 1~2문장으로 제안해주세요.";
                    const userPrompt = `오늘의 식물 관리 꿀팁은?`;

                    showAlert(`💡 오늘의 AI 꿀팁:\n\n${response}`, 'success');
                } catch (error) {
                    showAlert('팁을 불러오는 중 오류가 발생했습니다.', 'error');
                } finally {
                    setIsAILoadingTip(false);
                }
            };

            const parsedTasks = useMemo(() => {
                const todayList = { ventilate: [], nutrient: [], repot: [], spray: [], water: [] };
                const plannedList = {}; 

                plants.forEach(plant => {
                    Object.entries(plant.tasks).forEach(([taskType, dateStr]) => {
                        const diff = calculateDiffDays(dateStr);
                        const item = { plant, taskType, diff, dateStr };

                        if (diff <= 0) {
                            todayList[taskType].push(item);
                        } else {
                            if (!plannedList[diff]) plannedList[diff] = [];
                            plannedList[diff].push(item);
                        }
                    });
                });

                Object.keys(todayList).forEach(k => { todayList[k].sort((a, b) => a.diff - b.diff); });
                const sortedPlannedKeys = Object.keys(plannedList).sort((a, b) => Number(a) - Number(b));

                return { todayList, plannedList, sortedPlannedKeys };
            }, [plants]);


            const renderCalendar = () => {
                const year = calDate.getFullYear();
                const month = calDate.getMonth();

                const today = new Date();
                today.setHours(0,0,0,0);

                const selectedDone = actionHistory.filter(h => h.date.startsWith(selectedCalDate));

                    Object.entries(p.tasks).forEach(([type, dStr]) => {
                        if (dStr === selectedCalDate) selectedTasks.push({ plant: p, type });
                    });
                });

                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-50 slide-up">
